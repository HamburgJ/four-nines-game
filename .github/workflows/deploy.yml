name: Deploy to GitHub Pages

# The GitHub Pages deployment now serves a redirect page pointing to
# https://burgerfun.ca/four-nines/ (the canonical home of Four Nines).
# The playable game is still built from this repo by the burgerfun site,
# which vendors it as a submodule — nothing about that build changes here.

on:
  push:
    branches: main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload redirect page artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './pages-redirect'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
